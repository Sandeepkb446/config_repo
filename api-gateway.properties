spring.application.name=api-gateway

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Gateway Discovery Locator
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


# Order Service Route
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/fkt/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Rate Limiter Filter
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=5
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@ipKeyResolver}

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Server Port
server.port=8095
